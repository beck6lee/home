<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人主页</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-links">
            <a href="#home">首页</a>
            <a href="#about">关于</a>
            <a href="#skills">技能</a>
            <a href="#contact">联系</a>
        </div>
    </nav>

    <section id="home" class="hero">
        <div class="hero-content">
            <h1 id="hero-name">你好</h1>
            <p class="hero-tagline">欢迎来到我的个人主页</p>
            <div class="hero-icons">
                <a href="#" title="GitHub">GH</a>
                <a href="#" title="Email">✉</a>
            </div>
        </div>
    </section>

    <section id="about" class="section">
        <h2>关于我</h2>
        <p id="about-text" class="fade-in">点击编辑自我介绍...</p>
    </section>

    <section id="skills" class="section">
        <h2>技能</h2>
        <div class="skills-grid">
            <div class="skill-card">HTML</div>
            <div class="skill-card">CSS</div>
            <div class="skill-card">JavaScript</div>
        </div>
    </section>

    <section id="contact" class="section">
        <h2>联系我</h2>
        <p id="contact-info" class="fade-in">点击编辑联系方式...</p>
        <button id="edit-btn" class="edit-btn">编辑主页</button>
    </section>

    <footer>
        <p>&copy; 2026</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
